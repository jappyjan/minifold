services:
  minifold:
    image: ghcr.io/jappyjan/minifold:latest
    restart: unless-stopped
    expose:
      - "3000"
    # Coolify v4's dockercompose build pack auto-generates traefik routers but
    # omits the loadbalancer.server.port on the matching service, leaving the
    # proxy unable to route traffic to the container (returns 503). We add the
    # port-aware service labels explicitly. ${COOLIFY_RESOURCE_UUID} is
    # injected by Coolify into the deploy environment; on non-Coolify
    # deployments the variable expands to empty and traefik just ignores
    # these labels.
    labels:
      - "traefik.http.services.http-0-${COOLIFY_RESOURCE_UUID}-minifold.loadbalancer.server.port=3000"
      - "traefik.http.services.https-0-${COOLIFY_RESOURCE_UUID}-minifold.loadbalancer.server.port=3000"
    environment:
      - SERVICE_FQDN_MINIFOLD_3000
      - DATABASE_PATH=/app/data/minifold.db
      - MINIFOLD_THUMB_SERVICE_URL=http://minifold-thumbs:3001
    volumes:
      - minifold-data:/app/data
      - minifold-files:/files
    healthcheck:
      # Main image installs curl (not wget). Use curl with -f so non-2xx fails.
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  minifold-thumbs:
    image: ghcr.io/jappyjan/minifold-thumbs:latest
    restart: unless-stopped
    healthcheck:
      # /health only handles GET. Use a real GET (drop --spider, which sends HEAD).
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  minifold-data:
  minifold-files:
