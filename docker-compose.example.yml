services:
  minifold:
    image: ghcr.io/jappyjan/minifold:latest
    restart: unless-stopped
    environment:
      MINIFOLD_THUMB_SERVICE_URL: http://minifold-thumbs:3001
      DATABASE_PATH: /data/minifold.db
    volumes:
      - minifold-data:/data
    ports:
      - "3000:3000"
    networks:
      - minifold

  minifold-thumbs:
    image: ghcr.io/jappyjan/minifold-thumbs:latest
    restart: unless-stopped
    networks:
      - minifold
    # No published port: only reachable from the main app over the internal network.

volumes:
  minifold-data:

networks:
  minifold:
