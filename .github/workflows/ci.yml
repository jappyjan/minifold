name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (lint / typecheck / test / build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Generate default PWA icons (prebuild)
        # tests/app/api/icon/route.test.ts asserts the public/icons/* fallback —
        # those files are built by the `prebuild` script at `pnpm build` time,
        # but tests run before build. Generate them explicitly here.
        run: pnpm prebuild

      - name: Test
        run: pnpm test

      - name: Test thumb-worker
        run: pnpm --filter @minifold/thumb-worker test

      - name: Build
        run: pnpm build

      - name: Validate compose templates
        run: |
          docker compose -f docker-compose.yml config -q
          docker compose -f docker-compose.coolify.yml config -q
          MINIFOLD_DOMAIN=test.example.com docker compose -f docker-compose.traefik.yml config -q

      - name: Validate Unraid template XML
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends libxml2-utils
          xmllint --noout unraid-template.xml

  publish:
    name: Build & push minifold image to GHCR
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jappyjan/minifold
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-thumbs:
    name: Build & push minifold-thumbs image to GHCR
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jappyjan/minifold-thumbs
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: thumb-worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=thumbs
          cache-to: type=gha,mode=max,scope=thumbs
